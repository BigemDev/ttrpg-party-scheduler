<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — Scheduler</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5" />
      <line x1="12" y1="1" x2="12" y2="3" />
      <line x1="12" y1="21" x2="12" y2="23" />
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
      <line x1="1" y1="12" x2="3" y2="12" />
      <line x1="21" y1="12" x2="23" y2="12" />
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
    </svg>
  </button>

  <div class="login-shell">
    <div class="eyebrow">Party scheduler</div>
    <h1 style="font-size: 30px;">Enter the password</h1>
    <p style="margin-top: 8px;">This scheduler is private to your group.</p>

    <form id="login-form" class="card" style="margin-top: 24px;">
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autofocus required />
      </div>
      <button type="submit" class="btn-primary" style="width: 100%;">Enter</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script src="/login.js"></script>
</body>
</html>
